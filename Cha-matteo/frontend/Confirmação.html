<body class="container-background">

    <div class="container-confirmação">
        <h1>Confirmar Presença</h1>
        <p>Queremos muito sua presença! Por favor, confirme abaixo.</p>

        <form id="formConfirmacao">

            <div>
                <label>Nome completo *</label>
                <input type="text" id="nomeConvidado" name="nome" placeholder="Seu nome" required>
            </div>

            <div>
                <label>Você vai comparecer? *</label>

                <div class="radio-group">

                    <label class="radio-option">
                        <input type="radio" name="comparecer" value="1">
                        Sim, estarei presente!
                    </label>

                    <label class="radio-option">
                        <input type="radio" name="comparecer" value="0">
                        Não poderei ir!
                    </label>

                </div>
            </div>

            <div>
                <label>Número de acompanhantes</label>

                <select name="acompanhantes">
                    <option value="0">Apenas eu</option>
                    <option value="1">1 acompanhante</option>
                    <option value="2">2 acompanhantes</option>
                    <option value="3">3 acompanhantes</option>
                </select>
            </div>

            <div>
                <label>Mensagem (opcional)</label>

                <textarea name="mensagem" placeholder="Deixe uma mensagem carinhosa para os papais..."></textarea>
            </div>

             <button type="submit" class="btn-viniciustemngm">
                Confirmar presença!
            </button>

            
        </form>

    </div>

</body>
